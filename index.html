<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oliver's Games</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 42px;
    }

    p {
      color: #ccc;
      margin-bottom: 30px;
    }

    #gamesList {
      width: 90%;
      max-width: 700px;
      margin: 0 auto 40px auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .game-link {
      display: block;
      background: #222;
      color: white;
      text-decoration: none;
      padding: 18px;
      border-radius: 12px;
      font-size: 24px;
      font-weight: bold;
      border: 2px solid #444;
    }

    .game-link:hover {
      background: #333;
      border-color: #888;
    }
  </style>
</head>
<body>
  <h1>Oliver's Games</h1>
  <p>Click a game to play</p>

  <div id="gamesList"></div>

  <script>
    const games = [
      { name: "Snake 2", folder: "snake2" },
      { name: "Cookie Clicker", folder: "cookie-clicker" },
      { name: "Doger 1", folder: "doger1" }
    ];

    const gamesList = document.getElementById("gamesList");

    for (const game of games) {
      const link = document.createElement("a");
      link.className = "game-link";
      link.textContent = game.name;
      link.href = game.folder + "/";
      gamesList.appendChild(link);
    }
  </script>
</body>
</html>
